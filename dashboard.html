<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AstraNova Alpha Command</title>
    <style>
        /* Modern CSS Reset & Fonts */
        :root {
            --bg-void: #0b0f19;
            --bg-panel: #151e2e;
            --border-color: #1e293b;
            --accent-cyan: #00f2fe;
            --accent-gold: #fbbf24;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
        }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-void); color: var(--text-main); margin: 0; padding: 0; }
        
        /* Top Navigation Bar */
        .topbar { background: var(--bg-panel); border-bottom: 1px solid var(--border-color); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .topbar h1 { margin: 0; font-size: 24px; color: white; letter-spacing: 1px; }
        .topbar h1 span { color: var(--accent-cyan); }
        
        /* Resource Bar - Fixed Clipping */
        .res-bar { display: flex; gap: 20px; background: #0f172a; padding: 5px 20px; border-radius: 20px; border: 1px solid #334155; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .res-item { display: flex; align-items: center; gap: 8px; min-width: 90px; }
        .res-item input { width: 100%; background: transparent; border: none; font-weight: bold; padding: 0; text-align: left; outline: none; font-size: 14px; }
        
        .support-btn { background: linear-gradient(45deg, #ff69b4, #ff8c00); color: white; text-decoration: none; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; transition: transform 0.2s; cursor: pointer; }
        .support-btn:hover { transform: translateY(-2px); }

        /* Tabs */
        .tab-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .tabs { display: flex; gap: 10px; border-bottom: 2px solid var(--border-color); margin-bottom: 25px; }
        .tab-btn { background: transparent; color: var(--text-muted); border: none; padding: 12px 24px; font-size: 16px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--accent-cyan); border-bottom: 2px solid var(--accent-cyan); }
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }

        /* Panels */
        .panel { background-color: var(--bg-panel); border: 1px solid var(--border-color); padding: 25px; border-radius: 12px; margin-bottom: 25px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .ship-card { background-color: var(--bg-panel); border: 1px solid var(--border-color); padding: 15px; border-radius: 12px; display: flex; gap: 15px; align-items: center; position: relative; }
        .ship-card img { width: 85px; height: 85px; border-radius: 8px; object-fit: cover; border: 2px solid #334155; }
        
        /* Rarity Styles */
        .rarity-UltraRare { border-left: 4px solid #ff6363 !important; }
        .rarity-SuperRare { border-left: 4px solid #fbbf24 !important; }
        .rarity-Elite { border-left: 4px solid #c38dff !important; }
        .rarity-Rare { border-left: 4px solid #4fc3f7 !important; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        
        .eng-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .eng-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="topbar">
        <h1>AstraNova <span>Alpha</span></h1>
        
        <div class="res-bar">
            <div class="res-item" title="Oil">
                <span>🛢️</span>
                <input type="number" id="res-oil" value="0" onchange="saveResources()" style="color: white;">
            </div>
            <div class="res-item" title="Coins">
                <span>🪙</span>
                <input type="number" id="res-coins" value="0" onchange="saveResources()" style="color: var(--accent-gold);">
            </div>
            <div class="res-item" title="Wisdom Cubes">
                <span>🧊</span>
                <input type="number" id="res-cubes" value="0" onchange="saveResources()" style="color: var(--accent-cyan);">
            </div>
        </div>

        <div style="display: flex; gap: 20px; align-items: center;">
            <span id="api-status" style="font-size: 14px; color: var(--success);">● System Online</span>
            <a href="https://ko-fi.com/" target="_blank" class="support-btn">☕ Support Dev</a>
            <button onclick="logout()" style="background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 6px 15px; border-radius: 20px; cursor: pointer;">Logout</button>
        </div>
    </div>

    <div class="tab-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-command', this)">Command Center</button>
            <button class="tab-btn" onclick="switchTab('tab-shipyard', this)">Global Shipyard</button>
            <button class="tab-btn" onclick="switchTab('tab-engineering', this)">Engineering Bay</button>
            <button class="tab-btn" onclick="switchTab('tab-logistics', this)">Logistics</button>
        </div>

        <div id="tab-command" class="tab-content active">
            <div id="dock-container" class="grid-container"></div>
        </div>

        <div id="tab-shipyard" class="tab-content">
            <div class="panel">
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <input type="text" id="libSearch" placeholder="🔍 Search name..." onkeyup="filterLibrary()" style="flex-grow: 1; padding: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px;">
                    <select id="filterFaction" onchange="filterLibrary()" style="width: auto; padding: 10px; background: #0f172a; color: white; border-radius: 6px;">
                        <option value="all">All Factions</option>
                        <option value="eagle union">Eagle Union</option>
                        <option value="royal navy">Royal Navy</option>
                        <option value="sakura empire">Sakura Empire</option>
                        <option value="iron blood">Iron Blood</option>
                    </select>
                </div>
            </div>
            <div id="global-library" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px;"></div>
        </div>

        </div>

    <script>
        const API_URL = "https://astranova-api.onrender.com"; 
        const token = localStorage.getItem('astra_token');
        if (!token) { window.location.href = 'login.html'; }

        let allShipsInDB = []; 
        let currentDockData = []; 

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        async function fetchMyDock() {
            try {
                const res = await fetch(`${API_URL}/collection/me`, { headers: { 'Authorization': `Bearer ${token}` } });
                currentDockData = await res.json();
                renderDock();
            } catch (e) { console.error(e); }
        }

        function renderDock() {
            const container = document.getElementById('dock-container');
            container.innerHTML = "";
            currentDockData.forEach(item => {
                // Fixed Image Logic: Handle actual nulls
                const img = (item.ship.icon_url && item.ship.icon_url !== "null") ? item.ship.icon_url : 'https://placehold.co/100x100/1e293b/00f2fe?text=?';
                const card = document.createElement('div');
                card.className = `ship-card rarity-${item.ship.rarity.replace(/\s+/g, '')}`;
                card.innerHTML = `<img src="${img}"><div><h3 style="margin:0">${item.ship.name}</h3><div style="color:var(--accent-cyan)">Lv. ${item.level}</div></div>`;
                container.appendChild(card);
            });
        }

        async function fetchGlobalLibrary() {
            const container = document.getElementById('global-library');
            container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--accent-cyan); animation: pulse 1.5s infinite;">📡 SYNCHRONIZING DATABASE...</div>`;
            
            try {
                const res = await fetch(`${API_URL}/ships/`);
                allShipsInDB = await res.json();
                container.innerHTML = "";
                
                allShipsInDB.forEach(ship => {
                    const img = (ship.icon_url && ship.icon_url !== "null") ? ship.icon_url : 'https://placehold.co/100x100/1e293b/00f2fe?text=?';
                    const div = document.createElement('div');
                    div.className = "global-card";
                    div.setAttribute('data-name', ship.name.toLowerCase());
                    div.setAttribute('data-faction', ship.faction.toLowerCase());
                    div.innerHTML = `
                        <div style="background:var(--bg-panel); padding:10px; border-radius:8px; text-align:center; border:1px solid var(--border-color);">
                            <img src="${img}" style="width:60px; height:60px; border-radius:8px; object-fit:cover;">
                            <div style="font-size:12px; font-weight:bold; margin-top:5px; white-space:nowrap; overflow:hidden;">${ship.name}</div>
                            <button onclick="quickAdd(${ship.id})" style="width:100%; margin-top:5px; background:var(--success); border:none; border-radius:4px; cursor:pointer;">+ Add</button>
                        </div>`;
                    container.appendChild(div);
                });
            } catch (e) { container.innerHTML = "Offline."; }
        }

        function filterLibrary() {
            const term = document.getElementById('libSearch').value.toLowerCase();
            const faction = document.getElementById('filterFaction').value.toLowerCase();
            
            document.querySelectorAll('.global-card').forEach(card => {
                const nameMatch = card.getAttribute('data-name').includes(term);
                const factionMatch = faction === 'all' || card.getAttribute('data-faction').includes(faction);
                card.style.display = (nameMatch && factionMatch) ? "block" : "none";
            });
        }

        async function quickAdd(id) {
            await fetch(`${API_URL}/collection/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ ship_id: id, level: 1, affection: 50, is_oathed: false })
            });
            fetchMyDock();
            switchTab('tab-command', document.querySelector('.tab-btn'));
        }

        function saveResources() {
            localStorage.setItem('astra_oil', document.getElementById('res-oil').value);
            localStorage.setItem('astra_coins', document.getElementById('res-coins').value);
            localStorage.setItem('astra_cubes', document.getElementById('res-cubes').value);
        }

        function loadResources() {
            document.getElementById('res-oil').value = localStorage.getItem('astra_oil') || 0;
            document.getElementById('res-coins').value = localStorage.getItem('astra_coins') || 0;
            document.getElementById('res-cubes').value = localStorage.getItem('astra_cubes') || 0;
        }

        function logout() { localStorage.removeItem('astra_token'); window.location.href = 'login.html'; }

        loadResources();
        fetchGlobalLibrary();
        fetchMyDock();
    </script>
</body>
</html>
