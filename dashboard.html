<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AstraNova Alpha Command</title>
    <style>
        :root {
            --bg-void: #0b0f19; --bg-panel: #151e2e; --border-color: #1e293b;
            --accent-cyan: #00f2fe; --accent-gold: #fbbf24; --text-main: #e2e8f0;
            --text-muted: #94a3b8; --danger: #ef4444; --success: #22c55e;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-void); color: var(--text-main); margin: 0; }
        
        .topbar { background: var(--bg-panel); border-bottom: 1px solid var(--border-color); padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .res-bar { display: flex; gap: 20px; background: #0f172a; padding: 5px 20px; border-radius: 20px; border: 1px solid #334155; }
        .res-item { display: flex; align-items: center; gap: 8px; min-width: 90px; }
        .res-item input { width: 100%; background: transparent; border: none; font-weight: bold; color: white; outline: none; }

        .tab-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .tabs { display: flex; gap: 10px; border-bottom: 2px solid var(--border-color); margin-bottom: 25px; }
        .tab-btn { background: transparent; color: var(--text-muted); border: none; padding: 12px 24px; font-size: 16px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--accent-cyan); border-bottom: 2px solid var(--accent-cyan); }
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }

        .panel { background-color: var(--bg-panel); border: 1px solid var(--border-color); padding: 25px; border-radius: 12px; margin-bottom: 25px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .ship-card { background-color: var(--bg-panel); border: 1px solid var(--border-color); padding: 15px; border-radius: 12px; display: flex; gap: 15px; align-items: center; position: relative; }
        .ship-card img { width: 85px; height: 85px; border-radius: 8px; object-fit: cover; border: 2px solid #334155; }
        
        .rarity-UltraRare { border-left: 4px solid #ff6363 !important; }
        .rarity-SuperRare { border-left: 4px solid #fbbf24 !important; }
        .rarity-Elite { border-left: 4px solid #c38dff !important; }
        .rarity-Rare { border-left: 4px solid #4fc3f7 !important; }

        .eng-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .action-btn { background-color: var(--accent-cyan); color: #000; border: none; padding: 12px; cursor: pointer; border-radius: 6px; font-weight: bold; width: 100%; margin-top: 10px; }
        input, select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background-color: #0f172a; color: white; box-sizing: border-box; }
        label { display: block; margin-bottom: 5px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
		
		/* View Toggle & Table Styles */
        .view-toggle { display: flex; gap: 5px; background: #0f172a; padding: 4px; border-radius: 8px; border: 1px solid var(--border-color); }
        .view-btn { background: transparent; color: var(--text-muted); border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; }
        .view-btn.active { background: var(--bg-panel); color: var(--accent-cyan); border: 1px solid var(--accent-cyan); box-shadow: 0 0 8px rgba(0, 242, 254, 0.2); }
        
        .dock-table-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border-color); }
        .dock-table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: center; white-space: nowrap; }
        .dock-table th { background: #0f172a; padding: 12px 8px; color: var(--accent-gold); border-bottom: 2px solid var(--border-color); font-weight: 600; letter-spacing: 0.5px;}
        .dock-table td { padding: 8px; border-bottom: 1px solid var(--border-color); background: var(--bg-panel); vertical-align: middle; }
        .dock-table tr:hover td { background: #1e293b; }
        .td-ship { text-align: left; display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 13px; }
        .td-ship img { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; border: 1px solid #334155; }
        .stat-highlight { color: var(--accent-cyan); font-weight: bold; }
    </style>
</head>
<body>

    <div class="topbar">
        <h1>AstraNova <span>Alpha</span></h1>
        <div class="res-bar">
            <div class="res-item"><span>🛢️</span><input type="number" id="res-oil" onchange="saveResources()"></div>
            <div class="res-item"><span>🪙</span><input type="number" id="res-coins" onchange="saveResources()" style="color:var(--accent-gold)"></div>
            <div class="res-item"><span>🧊</span><input type="number" id="res-cubes" onchange="saveResources()" style="color:var(--accent-cyan)"></div>
        </div>
        <div>
            <span id="api-status">● System Online</span>
            <button onclick="logout()" style="margin-left:20px; background:transparent; border:1px solid var(--danger); color:var(--danger); padding:5px 15px; border-radius:20px; cursor:pointer;">Logout</button>
        </div>
    </div>

    <div class="tab-container">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('tab-command', this)">Command Center</button>
            <button class="tab-btn" onclick="switchTab('tab-shipyard', this)">Global Shipyard</button>
            <button class="tab-btn" onclick="switchTab('tab-engineering', this)">Engineering Bay</button>
            <button class="tab-btn" onclick="switchTab('tab-logistics', this)">Logistics</button>
        </div>

        <div id="tab-command" class="tab-content active">
            <div class="panel" style="border-left: 4px solid var(--accent-gold);">
                <h3 style="margin-top:0; color: var(--accent-gold);">⭐ Active Broadcast Fleet</h3>
                <div id="fleet-container" style="display: flex; flex-wrap: wrap; gap: 15px; min-height: 80px;">
                    <p style="color: var(--text-muted); margin: auto;">No ships assigned.</p>
                </div>
            </div>
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <div style="display:flex; align-items: center; gap: 20px;">
                    <h3 style="margin:0; color:var(--accent-cyan)">Personal Dock</h3>
                    <div class="view-toggle">
                        <button class="view-btn active" id="btn-view-cards" onclick="setDockView('cards')">🎴 Cards</button>
                        <button class="view-btn" id="btn-view-table" onclick="setDockView('table')">📋 Table</button>
                    </div>
                </div>
                <button onclick="bulkRetireCommons()" style="background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;">
                    🗑️ Bulk Retire Commons
                </button>
            </div>
            <div id="dock-container" class="grid-container"></div>
        </div>

        <div id="tab-shipyard" class="tab-content">
            <div class="panel">
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <input type="text" id="libSearch" placeholder="🔍 Search database..." onkeyup="filterLibrary()" style="flex-grow: 1;">
                    <select id="filterFaction" onchange="filterLibrary()" style="width: auto;">
                        <option value="all">All Factions</option>
                        <option value="eagle union">Eagle Union</option>
                        <option value="royal navy">Royal Navy</option>
                        <option value="sakura empire">Sakura Empire</option>
                        <option value="iron blood">Iron Blood</option>
                    </select>
                </div>
            </div>
            <div id="global-library" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px;"></div>
        </div>

<div id="tab-engineering" class="tab-content">
            <div class="panel">
                <h3 style="color:var(--accent-cyan); margin-top:0;">Ship Modification & Enhancement</h3>
                <div class="eng-grid">
                    <div><label>Ship ID</label><input type="number" id="shipId" readonly style="background:#1e293b; color:#94a3b8;"></div>
                    <div><label>Level</label><input type="number" id="shipLevel" value="1"></div>
                    <div><label>Affection</label><input type="number" id="shipAffection" value="50"></div>
                    <div style="display:flex; align-items:center; gap:10px; margin-top:20px;">
                        <input type="checkbox" id="shipOathed" style="width:20px"> <label style="margin:0">Oathed 💍</label>
                    </div>
                </div>

                <h4 style="color:var(--accent-gold); border-bottom:1px solid #334155; padding-bottom:5px; margin-top:25px;">Account Bonuses (Enhancement + Fleet Tech)</h4>
                <p style="font-size:11px; color:var(--text-muted); margin-top:-5px;">Enter the "+ Green Numbers" shown in-game when no gear is equipped.</p>
                <div class="eng-grid">
                    <div><label>Bonus ❤️ HP</label><input type="number" id="bonusHp" value="0"></div>
                    <div><label>Bonus ⚔️ FP</label><input type="number" id="bonusFp" value="0"></div>
                    <div><label>Bonus 🛡️ AA</label><input type="number" id="bonusAa" value="0"></div>
                    <div><label>Bonus ✈️ AVI</label><input type="number" id="bonusAvi" value="0"></div>
                    <div><label>Bonus 🐟 TRP</label><input type="number" id="bonusTrp" value="0"></div>
                </div>

                <button class="action-btn" onclick="addShipToAPI()">Update Ship Data</button>
            </div>
        </div>

        <div id="tab-logistics" class="tab-content">
            <div class="panel">
                <h3 style="color:var(--accent-gold); margin-top:0;">Awakening Calculator</h3>
                <div class="eng-grid">
                    <div><label>Select Ship</label><select id="calcDockId"></select></div>
                    <div><label>Target Level</label><select id="calcTargetLevel"><option value="120">120</option><option value="125">125</option></select></div>
                </div>
                <button class="action-btn" style="background:var(--accent-gold)" onclick="calculateAwakening()">Calculate Resources</button>
                <div id="calcResults" style="margin-top:20px; display:none; padding:15px; background:rgba(0,0,0,0.3); border-radius:8px;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://astranova-api.onrender.com"; 
        const token = localStorage.getItem('astra_token');
        if (!token) window.location.href = 'login.html';

        let allShipsInDB = []; 
        let currentDockData = [];
        let activeFleetIds = JSON.parse(localStorage.getItem('astra_active_fleet')) || []; 
		let currentDockView = 'cards';

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        async function fetchMyDock() {
            try {
                const res = await fetch(`${API_URL}/collection/me`, { headers: { 'Authorization': `Bearer ${token}` } });
                currentDockData = await res.json();
                renderDock();
                renderFleet();
                
                const sel = document.getElementById('calcDockId');
                sel.innerHTML = currentDockData.map(s => `<option value="${s.id}">${s.ship.name} (Lv.${s.level})</option>`).join('');
            } catch (error) {
                console.error("Failed to fetch dock", error);
            }
        }

       function renderDock() {
            const container = document.getElementById('dock-container');
            container.innerHTML = "";
            
            // If table view, set up the headers
            if (currentDockView === 'table') {
                container.className = "dock-table-wrapper";
                container.innerHTML = `
                    <table class="dock-table">
                        <thead>
                            <tr>
                                <th style="text-align:left">Ship</th>
                                <th>Lv</th>
                                <th>HP</th><th>FP</th><th>TRP</th><th>AVI</th><th>AA</th>
                                <th>EVA</th><th>ACC</th><th>ASW</th>
                                <th>SPD</th><th>LCK</th><th>ARMOR</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="dock-tbody"></tbody>
                    </table>`;
            } else {
                container.className = "grid-container";
            }

            const tbody = document.getElementById('dock-tbody');

            currentDockData.forEach(item => {
                const img = (item.ship.icon_url && item.ship.icon_url !== "null") ? item.ship.icon_url : 'https://placehold.co/100x100/1e293b/00f2fe?text=?';
                const s = item.ship.stats || {};
                const scale = (item.level - 1) / 119;
                
                let aff = 1.0;
                if (item.is_oathed) aff = 1.12;
                else if (item.affection >= 100) aff = 1.06;
                else if (item.affection >= 90) aff = 1.03;

                // Main 5 Stats
                const hp = Math.floor(((s.health ?? 200) + ((s.hp_120 ?? (s.health ?? 200)) - (s.health ?? 200)) * scale) * aff) + (item.bonus_hp || 0);
                const fp = Math.floor(((s.firepower ?? 0) + ((s.fp_120 ?? (s.firepower ?? 0)) - (s.firepower ?? 0)) * scale) * aff) + (item.bonus_fp || 0);
                const aa = Math.floor(((s.anti_air ?? 0) + ((s.aa_120 ?? (s.anti_air ?? 0)) - (s.anti_air ?? 0)) * scale) * aff) + (item.bonus_aa || 0);
                const avi = Math.floor(((s.aviation ?? 0) + ((s.avi_120 ?? (s.aviation ?? 0)) - (s.aviation ?? 0)) * scale) * aff) + (item.bonus_avi || 0);
                const trp = Math.floor(((s.torpedo ?? 0) + ((s.trp_120 ?? (s.torpedo ?? 0)) - (s.torpedo ?? 0)) * scale) * aff) + (item.bonus_trp || 0);

                // Newly Scraped Stats (Evasion, Accuracy, ASW scale with level)
                const eva = Math.floor(((s.evasion ?? 0) + ((s.evasion_120 ?? (s.evasion ?? 0)) - (s.evasion ?? 0)) * scale) * aff);
                const acc = Math.floor(((s.accuracy ?? 0) + ((s.accuracy_120 ?? (s.accuracy ?? 0)) - (s.accuracy ?? 0)) * scale) * aff);
                const asw = Math.floor(((s.anti_sub ?? 0) + ((s.anti_sub_120 ?? (s.anti_sub ?? 0)) - (s.anti_sub ?? 0)) * scale) * aff);

                // Static Stats (Speed, Luck, Armor do not scale)
                const spd = s.speed ?? 0;
                const lck = s.luck ?? 0;
                const armor = s.armor_type ?? 'Unknown';

                if (currentDockView === 'cards') {
                    // --- CARD RENDERING ---
                    let statDisplay = `❤️ ${hp.toLocaleString()}`;
                    if (fp > 0 || (avi === 0 && trp === 0)) statDisplay += ` | ⚔️ ${fp.toLocaleString()}`;
                    if (trp > 0) statDisplay += ` | 🐟 ${trp.toLocaleString()}`;
                    if (avi > 0) statDisplay += ` | ✈️ ${avi.toLocaleString()}`;
                    if (aa > 0) statDisplay += ` | 🛡️ ${aa.toLocaleString()}`;

                    const card = document.createElement('div');
                    card.className = `ship-card rarity-${item.ship.rarity.replace(/\s+/g, '')}`;
                    card.innerHTML = `
                        <img src="${img}">
                        <div style="flex-grow:1">
                            <h3 style="margin:0">${item.ship.name}</h3>
                            <div style="font-size:12px; color:var(--accent-cyan)">Lv. ${item.level}</div>
                            <div style="font-size:11px; margin-top:5px; color:var(--text-muted)">${statDisplay}</div>
                            <div style="display:flex; gap:5px; margin-top:8px;">
                                <button onclick="editShip(${item.id})" style="font-size:10px; cursor:pointer; background:#334155; color:white; border:none; border-radius:4px; padding:4px 8px;">🔧 Edit</button>
                                <button onclick="toggleFleet(${item.id})" style="font-size:10px; cursor:pointer; background:var(--accent-gold); color:black; border:none; border-radius:4px; padding:4px 8px; font-weight:bold;">⭐ Assign</button>
                                <button onclick="retireShip(${item.id})" style="font-size:10px; cursor:pointer; background:var(--danger); color:white; border:none; border-radius:4px; padding:4px 8px;">🗑️ Retire</button>
                            </div>
                        </div>`;
                    container.appendChild(card);
                } else {
                    // --- TABLE RENDERING ---
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="td-ship rarity-${item.ship.rarity.replace(/\s+/g, '')}" style="border-left: 3px solid; padding-left: 8px;">
                            <img src="${img}">
                            ${item.ship.name}
                        </td>
                        <td class="stat-highlight">${item.level}</td>
                        <td>${hp}</td><td>${fp}</td><td>${trp}</td><td>${avi}</td><td>${aa}</td>
                        <td style="color:#94a3b8">${eva}</td><td style="color:#94a3b8">${acc}</td><td style="color:#94a3b8">${asw}</td>
                        <td>${spd}</td><td>${lck}</td><td style="text-transform:capitalize;">${armor}</td>
                        <td>
                            <div style="display:flex; gap:4px; justify-content:center;">
                                <button onclick="editShip(${item.id})" style="cursor:pointer; background:#334155; color:white; border:none; border-radius:4px; padding:4px 6px;" title="Edit">🔧</button>
                                <button onclick="toggleFleet(${item.id})" style="cursor:pointer; background:var(--accent-gold); color:black; border:none; border-radius:4px; padding:4px 6px;" title="Assign">⭐</button>
                                <button onclick="retireShip(${item.id})" style="cursor:pointer; background:var(--danger); color:white; border:none; border-radius:4px; padding:4px 6px;" title="Retire">🗑️</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
            });
        }

        function toggleFleet(collectionId) {
            if (activeFleetIds.includes(collectionId)) {
                activeFleetIds = activeFleetIds.filter(id => id !== collectionId);
            } else {
                if (activeFleetIds.length >= 6) { alert("Fleet is full! Maximum 6 ships."); return; }
                activeFleetIds.push(collectionId);
            }
            localStorage.setItem('astra_active_fleet', JSON.stringify(activeFleetIds));
            renderFleet();
        }

        function renderFleet() {
            const container = document.getElementById('fleet-container');
            if (activeFleetIds.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted); margin: auto;">No ships assigned.</p>';
                return;
            }
            container.innerHTML = ""; 
            activeFleetIds.forEach(id => {
                const item = currentDockData.find(ship => ship.id === id);
                if (item) {
                    const img = (item.ship.icon_url && item.ship.icon_url !== "null") ? item.ship.icon_url : 'https://placehold.co/60x60/1e293b/00f2fe?text=?';
                    const div = document.createElement('div');
                    div.style = "background: var(--bg-void); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--accent-gold); width: 80px;";
                    div.innerHTML = `
                        <img src="${img}" style="width: 50px; height: 50px; border-radius: 6px; object-fit: cover; margin-bottom: 5px; border: 1px solid #334155;">
                        <div style="font-weight: bold; color: #fff; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.ship.name}</div>
                        <div style="font-size: 10px; color: var(--success); margin-bottom: 5px;">Lv. ${item.level}</div>
                        <button onclick="toggleFleet(${item.id})" style="background: var(--danger); padding: 4px; font-size: 10px; width: 100%; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold;">Remove</button>
                    `;
                    container.appendChild(div);
                }
            });
        }

        // Updated to pass the unique Collection ID and pull existing bonuses
        function editShip(collectionId) {
            const item = currentDockData.find(s => s.id === collectionId);
            if (!item) return;
            
            switchTab('tab-engineering', document.querySelectorAll('.tab-btn')[2]);
            // Notice we use item.ship_id here for the API, but display the data from the collection
            document.getElementById('shipId').value = item.ship_id; 
            document.getElementById('shipLevel').value = item.level;
            document.getElementById('shipAffection').value = item.affection;
            document.getElementById('shipOathed').checked = item.is_oathed;
            
            document.getElementById('bonusHp').value = item.bonus_hp || 0;
            document.getElementById('bonusFp').value = item.bonus_fp || 0;
            document.getElementById('bonusAa').value = item.bonus_aa || 0;
            document.getElementById('bonusAvi').value = item.bonus_avi || 0;
            document.getElementById('bonusTrp').value = item.bonus_trp || 0;
        }

async function addShipToAPI() {
            const payload = {
                ship_id: parseInt(document.getElementById('shipId').value),
                level: parseInt(document.getElementById('shipLevel').value),
                affection: parseInt(document.getElementById('shipAffection').value),
                is_oathed: document.getElementById('shipOathed').checked,
                bonus_hp: parseInt(document.getElementById('bonusHp').value) || 0,
                bonus_fp: parseInt(document.getElementById('bonusFp').value) || 0,
                bonus_aa: parseInt(document.getElementById('bonusAa').value) || 0,
                bonus_avi: parseInt(document.getElementById('bonusAvi').value) || 0,
                bonus_trp: parseInt(document.getElementById('bonusTrp').value) || 0
            };
            
            await fetch(`${API_URL}/collection/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });
            fetchMyDock();
            switchTab('tab-command', document.querySelector('.tab-btn'));
        }

        let displayedCount = 40; 
        let shipyardBatch = 30; 
        let currentDisplayCount = 30;

        async function fetchGlobalLibrary() {
            const container = document.getElementById('global-library');
            container.innerHTML = `<div id="loading-msg" style="grid-column: 1/-1; text-align: center; color: var(--accent-cyan); animation: pulse 1.5s infinite;">📡 WAKING UP SERVER... PLEASE WAIT</div>`;
            
            try {
                const res = await fetch(`${API_URL}/ships/`);
                if (!res.ok) throw new Error("Server Booting");
                allShipsInDB = await res.json();
                renderShipyard(true);
            } catch (err) {
                container.innerHTML = `<div style="grid-column: 1/-1; color: var(--danger); text-align:center;">⚠️ Link failed. Open <a href="${API_URL}/ships/" target="_blank" style="color:white">this link</a> once to wake the server, then refresh.</div>`;
            }
        }

        function renderShipyard(reset = false) {
            if (reset) currentDisplayCount = shipyardBatch;
            const container = document.getElementById('global-library');
            const term = document.getElementById('libSearch').value.toLowerCase();
            const faction = document.getElementById('filterFaction').value.toLowerCase();

            const filtered = allShipsInDB.filter(ship => {
                const nameMatch = ship.name.toLowerCase().includes(term);
                const factionMatch = faction === 'all' || ship.faction.toLowerCase().includes(faction);
                return nameMatch && factionMatch;
            });

            const toDisplay = filtered.slice(0, currentDisplayCount);
            
            container.innerHTML = toDisplay.map(ship => `
                <div class="global-card">
                    <div style="background:var(--bg-panel); padding:10px; border-radius:8px; text-align:center; border:1px solid var(--border-color)">
                        <img src="${ship.icon_url}" loading="lazy" style="width:60px; height:60px; border-radius:8px; object-fit:cover; margin-bottom:5px;">
                        <div style="font-size:12px; font-weight:bold; overflow:hidden; white-space:nowrap;">${ship.name}</div>
                        <button onclick="quickAdd(${ship.id})" style="width:100%; margin-top:5px; padding:6px; font-size:11px; background:rgba(34, 197, 94, 0.2); color:var(--success); border:1px solid var(--success); border-radius:4px; cursor:pointer;">+ Add</button>
                    </div>
                </div>
            `).join('');
        }

        window.onscroll = function() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                if (currentDisplayCount < allShipsInDB.length) {
                    currentDisplayCount += shipyardBatch;
                    renderShipyard();
                }
            }
        };

        function filterLibrary() {
            renderShipyard(true);
        }

        async function retireShip(collectionId) {
            if (!confirm("Confirm Retirement? This ship will leave the fleet forever.")) return;
            await fetch(`${API_URL}/collection/${collectionId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            fetchMyDock();
        }

        async function bulkRetireCommons() {
            const commons = currentDockData.filter(item => 
                item.ship.rarity && (item.ship.rarity.toLowerCase() === "common" || item.ship.rarity.toLowerCase() === "normal")
            );

            if (commons.length === 0) {
                alert("No Common quality ships found in the dockyard.");
                return;
            }

            if (!confirm(`Commander, shall we scrap all ${commons.length} Common ships?`)) return;

            for (const ship of commons) {
                await fetch(`${API_URL}/collection/${ship.id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
            }
            alert("Bulk Retirement successful.");
            fetchMyDock();
        }

        async function quickAdd(id) {
            await fetch(`${API_URL}/collection/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ ship_id: id, level: 1, affection: 50, is_oathed: false })
            });
            fetchMyDock();
            switchTab('tab-command', document.querySelector('.tab-btn'));
        }

        function calculateAwakening() {
            const shipId = document.getElementById('calcDockId').value;
            const target = parseInt(document.getElementById('calcTargetLevel').value);
            const ship = currentDockData.find(s => s.id == shipId);

            if (!ship) return;
            const currentLvl = ship.level;
            const rarity = ship.ship.rarity;

            if (currentLvl >= target) {
                alert(`Commander, ${ship.ship.name} is already at or above Level ${target}!`);
                return;
            }

            let coins = 0; let chips = 0; let arrays = 0;
            const milestones = [100, 105, 110, 115, 120];
            
            milestones.forEach(m => {
                if (currentLvl <= m && target > m) {
                    if (rarity === "Ultra Rare") {
                        if (m === 100) { coins += 3000; chips += 150; }
                        if (m === 105) { coins += 4500; chips += 200; }
                        if (m === 110) { coins += 6000; chips += 250; }
                        if (m === 115) { coins += 7500; chips += 300; }
                        if (m === 120) { coins += 15000; chips += 800; arrays += 50; }
                    } else if (rarity === "Super Rare") {
                        if (m === 100) { coins += 2000; chips += 120; }
                        if (m === 105) { coins += 3000; chips += 150; }
                        if (m === 110) { coins += 4000; chips += 180; }
                        if (m === 115) { coins += 5000; chips += 200; }
                        if (m === 120) { coins += 10000; chips += 500; arrays += 50; }
                    } else {
                        if (m === 100) { coins += 1000; chips += 80; }
                        if (m === 105) { coins += 1500; chips += 100; }
                        if (m === 110) { coins += 2000; chips += 120; }
                        if (m === 115) { coins += 2500; chips += 140; }
                        if (m === 120) { coins += 5000; chips += 300; arrays += 50; }
                    }
                }
            });

            const resDiv = document.getElementById('calcResults');
            resDiv.style.display = "block";
            resDiv.innerHTML = `
                <div style="border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 15px;">
                    <h4 style="margin:0; color: white;">Awakening Plan: <span style="color:var(--accent-gold)">${ship.ship.name}</span></h4>
                    <small style="color:var(--text-muted)">From Lv.${currentLvl} to Target Lv.${target}</small>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                    <div style="text-align:center; background:#0f172a; padding:10px; border-radius:6px; border:1px solid #334155;">
                        <div style="font-size:20px">🪙</div>
                        <div style="font-weight:bold; color:var(--accent-gold)">${coins.toLocaleString()}</div>
                        <div style="font-size:10px; color:var(--text-muted)">COINS</div>
                    </div>
                    <div style="text-align:center; background:#0f172a; padding:10px; border-radius:6px; border:1px solid #334155;">
                        <div style="font-size:20px">🧬</div>
                        <div style="font-weight:bold; color:var(--accent-cyan)">${chips.toLocaleString()}</div>
                        <div style="font-size:10px; color:var(--text-muted)">CHIPS</div>
                    </div>
                    <div style="text-align:center; background:#0f172a; padding:10px; border-radius:6px; border:1px solid #334155;">
                        <div style="font-size:20px">💠</div>
                        <div style="font-weight:bold; color:#c38dff">${arrays.toLocaleString()}</div>
                        <div style="font-size:10px; color:var(--text-muted)">ARRAYS</div>
                    </div>
                </div>
            `;
        }

        function saveResources() {
            localStorage.setItem('astra_oil', document.getElementById('res-oil').value);
            localStorage.setItem('astra_coins', document.getElementById('res-coins').value);
            localStorage.setItem('astra_cubes', document.getElementById('res-cubes').value);
        }

        function loadResources() {
            document.getElementById('res-oil').value = localStorage.getItem('astra_oil') || 0;
            document.getElementById('res-coins').value = localStorage.getItem('astra_coins') || 0;
            document.getElementById('res-cubes').value = localStorage.getItem('astra_cubes') || 0;
        }

        function logout() { localStorage.removeItem('astra_token'); window.location.href = 'login.html'; }

        loadResources(); fetchGlobalLibrary(); fetchMyDock();
		
		function setDockView(viewType) {
            currentDockView = viewType;
            document.getElementById('btn-view-cards').classList.toggle('active', viewType === 'cards');
            document.getElementById('btn-view-table').classList.toggle('active', viewType === 'table');
            renderDock(); // Re-render the dock with the new layout
        }
		
		
    </script>
</body>
</html>
