<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AstraNova | Secure Uplink</title>
    <style>
        :root {
            --bg-void: #0b0f19;
            --accent-cyan: #00f2fe;
            --text-muted: #94a3b8;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-void);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 242, 254, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(18, 24, 38, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 24, 38, 0.5) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-card {
            background: rgba(21, 30, 46, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid #1e293b;
            border-top: 4px solid var(--accent-cyan);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .logo h1 span { color: var(--accent-cyan); }

        .status-tag {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 30px;
            display: block;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 2px rgba(0, 242, 254, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--accent-cyan);
            color: #0b0f19;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #00d2f0;
            transform: translateY(-1px);
        }

        .toggle-text {
            margin-top: 25px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .toggle-text a {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        #error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-top: 15px;
            min-height: 18px;
        }

        /* Loading Animation */
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top-color: #0b0f19;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
		
		.compliance-footer {
            /* Removed absolute positioning */
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            width: 100%;
            padding: 40px 0 20px 0; /* Creates breathing room */
            margin-top: 50px; /* Pushes it away from the content above */
            border-top: 1px solid rgba(255, 255, 255, 0.05); /* Adds a sleek separator line */
            clear: both; /* Guarantees it stays at the absolute bottom */
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">
            <h1>Astra<span>Nova</span></h1>
            <span class="status-tag">Fleet Data Protocol v2.0</span>
        </div>

        <div id="login-form">
            <div class="input-group">
                <label>Commander Identifier</label>
                <input type="text" id="user" placeholder="Enter username...">
            </div>
            <div class="input-group">
                <label>Security Key</label>
                <input type="password" id="pass" placeholder="••••••••">
            </div>
            
            <button class="btn-primary" onclick="handleAuth('login')">
                <span id="btn-text">Establish Link</span>
                <div id="spinner" class="loading-spinner"></div>
            </button>
        </div>

        <div id="error-msg"></div>

        <div class="toggle-text">
            <span id="toggle-msg">New Commander?</span> 
            <a id="toggle-link" onclick="toggleView()">Register Credentials</a>
        </div>
    </div>

<script>
        const API_URL = "https://astranova-api.onrender.com";
        let isLogin = true;

        function toggleView() {
            isLogin = !isLogin;
            document.getElementById('btn-text').innerText = isLogin ? 'Establish Link' : 'Register Commander';
            document.getElementById('toggle-msg').innerText = isLogin ? 'New Commander?' : 'Already Registered?';
            document.getElementById('toggle-link').innerText = isLogin ? 'Register Credentials' : 'Return to Login';
            document.getElementById('error-msg').innerText = '';
        }

        async function handleAuth() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const errorDiv = document.getElementById('error-msg');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('spinner');

            if(!user || !pass) {
                errorDiv.innerText = "Fields cannot be empty.";
                return;
            }

            btnText.style.display = 'none';
            spinner.style.display = 'block';
            errorDiv.innerText = "Connecting... (This may take 50s if server is waking up)";

            try {
                if (isLogin) {
                    const form = new URLSearchParams();
                    form.append('username', user);
                    form.append('password', pass);

                    const res = await fetch(`${API_URL}/token`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: form
                    });

                    if (res.ok) {
                        const data = await res.json();
                        localStorage.setItem('astra_token', data.access_token);
                        window.location.href = 'dashboard.html';
                    } else {
                        errorDiv.innerText = "Invalid credentials.";
                    }
                } else {
                    // 🚨 THE FIX IS HERE: Changed /users/ to /register
                    const res = await fetch(`${API_URL}/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: user, password: pass })
                    });

                    if (res.ok) {
                        alert("Commander Registered. You may now link.");
                        toggleView();
                    } else {
                        const data = await res.json();
                        errorDiv.innerText = data.detail || "Registration failed. Username may exist.";
                        console.error("API Error Response:", data);
                    }
                }
            } catch (err) {
                console.error("Fetch failed:", err);
                errorDiv.innerText = "Connection failed. Check console (F12) for CORS or timeout errors.";
            } finally {
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleAuth();
        });
    </script>
</body>
</html>
